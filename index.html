<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Labubu Bot – Tu travieso favorito ✨</title>
    <style>
        /* ===== PALETA DE COLORES LABUBU ===== */
        :root {
            --rosa-suave: #FFE4E1;
            --rosa-medio: #FFB6C1;
            --rosa-intenso: #FF69B4;
            --rosa-oscuro: #DB7093;
            --verde-bosque: #228B22;
            --verde-claro: #90EE90;
            --marron-pelaje: #8B4513;
            --marron-claro: #D2691E;
            --crema: #FFF8DC;
            --blanco: #FFFFFF;
            --sombra-suave: rgba(255, 105, 180, 0.2);
            --sombra-media: rgba(255, 105, 180, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--rosa-suave) 0%, var(--crema) 50%, var(--verde-claro) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* ===== ANIMACIONES ===== */
        @keyframes flotar {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes latir {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes brillar {
            0%, 100% { opacity: 1; filter: brightness(1); }
            50% { opacity: 0.8; filter: brightness(1.3); }
        }

        @keyframes aparecer {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes rebote {
            0%, 100% { transform: translateY(0); }
            25% { transform: translateY(-5px); }
            75% { transform: translateY(3px); }
        }

        @keyframes girar {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ===== CONTENEDOR PRINCIPAL ===== */
        .chat-container {
            width: 100%;
            max-width: 500px;
            background: var(--blanco);
            border-radius: 30px;
            box-shadow: 
                0 20px 60px var(--sombra-suave),
                0 0 0 4px var(--rosa-medio),
                0 0 0 8px var(--rosa-suave);
            overflow: hidden;
            animation: aparecer 0.8s ease-out;
            position: relative;
        }

        /* Decoración de hojas */
        .chat-container::before,
        .chat-container::after {
            content: '🌿';
            position: absolute;
            font-size: 24px;
            opacity: 0.6;
            animation: flotar 3s ease-in-out infinite;
        }

        .chat-container::before {
            top: 10px;
            left: 15px;
        }

        .chat-container::after {
            top: 10px;
            right: 15px;
            animation-delay: 1.5s;
        }

        /* ===== HEADER ===== */
        .chat-header {
            background: linear-gradient(135deg, var(--rosa-medio) 0%, var(--rosa-intenso) 100%);
            padding: 25px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .chat-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
            animation: girar 20s linear infinite;
        }

        .header-content {
            position: relative;
            z-index: 1;
        }

        .avatar-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .diente-emoji {
            font-size: 28px;
            animation: latir 1.5s ease-in-out infinite;
            display: inline-block;
        }

        .diente-emoji:nth-child(2) {
            animation-delay: 0.3s;
        }

        .labubu-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 4px solid var(--blanco);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            background: var(--crema);
            object-fit: cover;
            animation: flotar 2s ease-in-out infinite;
            transition: transform 0.3s ease;
        }

        .labubu-avatar:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .chat-title {
            color: var(--blanco);
            font-size: 1.8em;
            font-weight: 800;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .chat-subtitle {
            color: var(--crema);
            font-size: 0.95em;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .sparkle {
            animation: brillar 2s ease-in-out infinite;
        }

        /* ===== ESTADO API ===== */
        .api-status {
            margin-top: 12px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.25);
            border-radius: 20px;
            display: inline-block;
            color: var(--blanco);
            font-size: 0.85em;
            font-weight: 600;
            backdrop-filter: blur(5px);
            animation: rebote 2s ease-in-out infinite;
        }

        .api-status.conectado {
            background: rgba(144, 238, 144, 0.4);
            animation: none;
        }

        .api-status.error {
            background: rgba(255, 99, 71, 0.4);
            animation: none;
        }

        /* ===== ÁREA DE MENSAJES ===== */
        .chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: linear-gradient(180deg, var(--blanco) 0%, var(--rosa-suave) 100%);
            scrollbar-width: thin;
            scrollbar-color: var(--rosa-medio) transparent;
        }

        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--rosa-medio);
            border-radius: 10px;
        }

        /* ===== BURBUJA DE MENSAJE ===== */
        .message {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 16px;
            animation: aparecer 0.4s ease-out;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .message-avatar.bot {
            background: linear-gradient(135deg, var(--rosa-medio), var(--rosa-intenso));
            animation: flotar 2s ease-in-out infinite;
        }

        .message-avatar.user {
            background: linear-gradient(135deg, var(--verde-claro), var(--verde-bosque));
            order: 2;
        }

        .message-bubble {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 0.95em;
            line-height: 1.5;
            position: relative;
            word-wrap: break-word;
        }

        .message.bot .message-bubble {
            background: linear-gradient(135deg, var(--rosa-suave), var(--blanco));
            color: var(--marron-pelaje);
            border-bottom-left-radius: 4px;
            box-shadow: 0 3px 12px var(--sombra-suave);
            border: 2px solid var(--rosa-medio);
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, var(--verde-claro), #98FB98);
            color: var(--verde-bosque);
            border-bottom-right-radius: 4px;
            box-shadow: 0 3px 12px rgba(34, 139, 34, 0.15);
            border: 2px solid var(--verde-bosque);
            margin-left: auto;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        /* Efecto de typing */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--rosa-intenso);
            border-radius: 50%;
            animation: rebote 0.6s ease-in-out infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        /* ===== ÁREA DE INPUT ===== */
        .chat-input-area {
            padding: 18px 20px;
            background: var(--blanco);
            border-top: 3px solid var(--rosa-suave);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .input-wrapper::before {
            content: '✨';
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            opacity: 0.6;
            pointer-events: none;
        }

        #userInput {
            width: 100%;
            padding: 14px 18px 14px 40px;
            border: 3px solid var(--rosa-medio);
            border-radius: 25px;
            font-size: 0.95em;
            outline: none;
            background: var(--rosa-suave);
            color: var(--marron-pelaje);
            transition: all 0.3s ease;
        }

        #userInput::placeholder {
            color: var(--rosa-oscuro);
            opacity: 0.7;
        }

        #userInput:focus {
            border-color: var(--rosa-intenso);
            background: var(--blanco);
            box-shadow: 0 0 15px var(--sombra-suave);
            transform: scale(1.02);
        }

        #userInput:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #f0f0f0;
        }

        #sendBtn {
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--rosa-intenso), var(--rosa-oscuro));
            color: var(--blanco);
            border: none;
            border-radius: 25px;
            font-size: 0.95em;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 15px var(--sombra-media);
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        #sendBtn:hover:not(:disabled) {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 6px 20px var(--sombra-media);
            background: linear-gradient(135deg, var(--rosa-oscuro), var(--rosa-intenso));
        }

        #sendBtn:active:not(:disabled) {
            transform: translateY(0) scale(0.98);
        }

        #sendBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #ccc;
            box-shadow: none;
        }

        /* ===== DECORACIONES FLOTANTES ===== */
        .floating-decorations {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .floating-item {
            position: absolute;
            font-size: 24px;
            opacity: 0.4;
            animation: flotar 4s ease-in-out infinite;
        }

        .floating-item:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; font-size: 30px; }
        .floating-item:nth-child(2) { top: 20%; right: 8%; animation-delay: 1s; font-size: 22px; }
        .floating-item:nth-child(3) { top: 60%; left: 3%; animation-delay: 2s; font-size: 28px; }
        .floating-item:nth-child(4) { top: 70%; right: 5%; animation-delay: 0.5s; font-size: 25px; }
        .floating-item:nth-child(5) { top: 40%; left: 8%; animation-delay: 1.5s; font-size: 20px; }
        .floating-item:nth-child(6) { top: 85%; right: 10%; animation-delay: 2.5s; font-size: 26px; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .chat-container {
                border-radius: 20px;
            }

            .chat-messages {
                height: 350px;
                padding: 15px;
            }

            .chat-title {
                font-size: 1.5em;
            }

            .labubu-avatar {
                width: 55px;
                height: 55px;
            }

            #sendBtn {
                padding: 12px 18px;
                font-size: 0.85em;
            }
        }

        /* ===== ANIMACIÓN DE ENTRADA PARA NUEVOS MENSAJES ===== */
        .message-nuevo {
            animation: aparecer 0.5s ease-out !important;
        }
    </style>
</head>
<body>
    <!-- Decoraciones flotantes de fondo -->
    <div class="floating-decorations">
        <div class="floating-item">🌸</div>
        <div class="floating-item">🍄</div>
        <div class="floating-item">🦋</div>
        <div class="floating-item">🌿</div>
        <div class="floating-item">✨</div>
        <div class="floating-item">🧸</div>
    </div>

    <div class="chat-container">
        <!-- Header -->
        <div class="chat-header">
            <div class="header-content">
                <div class="avatar-container">
                    <span class="diente-emoji">🦷</span>
                    <img src="https://kimi-web-img.moonshot.cn/img/static.wikia.nocookie.net/a0a79e60aebbed2123984dc41c28e4eae36a1fe5" 
                         alt="Labubu - The Monsters" 
                         class="labubu-avatar"
                         onerror="this.src='https://emoji.gg/assets/emoji/7069_Fang_Blush.png'">
                    <span class="diente-emoji">🦷</span>
                </div>
                <h1 class="chat-title">Labubu Bot</h1>
                <p class="chat-subtitle">
                    <span class="sparkle">✨</span>
                    el travieso de The Monsters
                    <span class="sparkle">✨</span>
                </p>
                <div id="apiStatus" class="api-status">✨ Cargando magia traviesa... ✨</div>
            </div>
        </div>

        <!-- Área de mensajes -->
        <div id="chatMessages" class="chat-messages">
            <div class="message bot">
                <div class="message-avatar bot">🦷</div>
                <div class="message-bubble">
                    ¡Holi! Soy Labubu, el duende más travieso y adorable. ¿Necesitas ayuda con tus colecciones? 🧸✨
                </div>
            </div>
        </div>

        <!-- Área de input -->
        <div class="chat-input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Escríbele a Labubu..." disabled>
            </div>
            <button id="sendBtn" disabled>
                Enviar <span style="font-size:1.2em">✨</span>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
